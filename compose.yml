name: slang-jailbreak-bench

services:
  # ─────────────────────────────────────────────────────────────
  # PostgreSQL — stores the jerga corpus + attack results
  # ─────────────────────────────────────────────────────────────
  postgres:
    build:
      context: ./docker/postgres
    image: slang-bench/postgres:latest
    container_name: slang_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-slang_bench}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-slang_bench}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - slang_net

  # ─────────────────────────────────────────────────────────────
  # n8n — orchestrates the attacker → target → judge → storage loop
  # ─────────────────────────────────────────────────────────────
  n8n:
    build:
      context: ./docker/n8n
    image: slang-bench/n8n:latest
    container_name: slang_n8n
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${TZ:-America/Merida}
      TZ: ${TZ:-America/Merida}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-please-change-this-key}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_RUNNERS_ENABLED: "true"
      # Credentials available to nodes (HTTP Request + Postgres nodes read these).
      # All target + attacker + judge LLMs are served by NVIDIA NIM.
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-slang_bench}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_API_BASE: ${NVIDIA_API_BASE:-https://integrate.api.nvidia.com/v1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_API_BASE: ${OPENROUTER_API_BASE:-https://openrouter.ai/api/v1}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - slang_net

  # ─────────────────────────────────────────────────────────────
  # Grafana — dashboards for jailbreak success rate per model/technique
  # ─────────────────────────────────────────────────────────────
  grafana:
    build:
      context: ./docker/grafana
    image: slang-bench/grafana:latest
    container_name: slang_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # PostgreSQL is a built-in, signed datasource — provisioning reads these.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-slang_bench}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana:/var/lib/grafana/dashboards:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - slang_net

volumes:
  postgres_data:
  n8n_data:
  grafana_data:

networks:
  slang_net:
    driver: bridge
