name: slang-jailbreak-bench

services:
  # ─────────────────────────────────────────────────────────────
  # MongoDB — stores the jerga corpus + attack results
  # ─────────────────────────────────────────────────────────────
  mongodb:
    build:
      context: ./docker/mongodb
    image: slang-bench/mongodb:latest
    container_name: slang_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-slang_bench}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - slang_net

  # ─────────────────────────────────────────────────────────────
  # n8n — orchestrates the attacker → target → judge → storage loop
  # ─────────────────────────────────────────────────────────────
  n8n:
    build:
      context: ./docker/n8n
    image: slang-bench/n8n:latest
    container_name: slang_n8n
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${TZ:-America/Merida}
      TZ: ${TZ:-America/Merida}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-please-change-this-key}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_RUNNERS_ENABLED: "true"
      # Credentials available to nodes (HTTP Request nodes read these).
      # All target + attacker + judge LLMs are served by NVIDIA NIM.
      MONGO_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/${MONGO_DB:-slang_bench}?authSource=admin
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_API_BASE: ${NVIDIA_API_BASE:-https://integrate.api.nvidia.com/v1}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - slang_net

  # ─────────────────────────────────────────────────────────────
  # Grafana — dashboards for jailbreak success rate per model/technique
  # ─────────────────────────────────────────────────────────────
  grafana:
    build:
      context: ./docker/grafana
    image: slang-bench/grafana:latest
    container_name: slang_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # MongoDB datasource is a community/unsigned plugin — allow it explicitly
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: haohanyang-mongodb-datasource
      MONGO_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/${MONGO_DB:-slang_bench}?authSource=admin
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana:/var/lib/grafana/dashboards:ro
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - slang_net

volumes:
  mongo_data:
  mongo_config:
  n8n_data:
  grafana_data:

networks:
  slang_net:
    driver: bridge
