apiVersion: 1

providers:
  - name: slang-bench-dashboards
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      # dashboard JSON files are mounted here from ./grafana (see compose.yml)
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
