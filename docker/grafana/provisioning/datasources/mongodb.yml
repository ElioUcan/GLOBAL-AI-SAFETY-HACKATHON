apiVersion: 1

datasources:
  - name: MongoDB
    type: haohanyang-mongodb-datasource
    access: proxy
    isDefault: true
    jsonData:
      # Connection string is injected from the MONGO_URL env var (see compose.yml)
      connectionStringSource: 1
      database: ${MONGO_DB}
    secureJsonData:
      connectionString: ${MONGO_URL}
    editable: true
